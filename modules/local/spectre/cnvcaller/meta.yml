name: "spectre_cnvcaller"
description: Call copy number variants from Oxford Nanopore sequencing data using Spectre
keywords:
  - cnv
  - copy number
  - structural variants
  - nanopore
  - ont
  - spectre
tools:
  - spectre:
      description: A tool for identifying somatic copy number variations (CNVs) from low-pass whole genome sequencing (LP-WGS)
      homepage: https://github.com/fritzsedlazeck/Spectre
      documentation: https://github.com/fritzsedlazeck/Spectre/blob/main/README.md
      tool_dev_url: https://github.com/fritzsedlazeck/Spectre
      doi: "10.1101/2021.10.27.466189"
      licence: ["MIT"]
  - bcftools:
      description: BCFtools is a set of utilities that manipulate variant calls in VCF and BCF format
      homepage: https://samtools.github.io/bcftools/
      documentation: https://samtools.github.io/bcftools/bcftools.html
      tool_dev_url: https://github.com/samtools/bcftools
      doi: "10.1093/gigascience/giab008"
      licence: ["MIT"]

input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. `[ id:'sample1' ]`
  - mosdepth_summary:
      type: file
      description: Mosdepth summary file from coverage analysis
      pattern: "*.mosdepth.summary.txt"
  - mosdepth_regions_bed:
      type: file
      description: Mosdepth regions bed file (compressed)
      pattern: "*.regions.bed.gz"
  - mosdepth_regions_csi:
      type: file
      description: Index for mosdepth regions bed file
      pattern: "*.regions.bed.gz.csi"
  - vcf:
      type: file
      description: VCF file containing SNV calls (e.g., from Clair3)
      pattern: "*.vcf.gz"
  - meta2:
      type: map
      description: |
        Groovy Map containing reference genome metadata
        e.g. `[ id:'reference' ]`
  - fasta:
      type: file
      description: Reference genome in FASTA format
      pattern: "*.{fa,fasta}"
  - metadata_file:
      type: file
      description: Metadata file for Spectre CNV calling
      pattern: "*.txt"
  - blacklist:
      type: file
      description: Blacklist regions to exclude from CNV calling
      pattern: "*.bed"
  - bin_size:
      type: integer
      description: Bin size for CNV calling (typically 1000)

output:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. `[ id:'sample1' ]`
  - vcf:
      type: file
      description: Compressed and sorted VCF file containing CNV calls
      pattern: "*.vcf.gz"
  - tbi:
      type: file
      description: Index file for the VCF
      pattern: "*.vcf.gz.tbi"
  - bed:
      type: file
      description: BED file with CNV regions
      pattern: "*.bed"
  - spc:
      type: file
      description: Spectre compressed output file
      pattern: "*.spc.gz"
  - txt:
      type: file
      description: Predicted karyotype information
      pattern: "predicted_karyotype.txt"
  - winstats:
      type: directory
      description: Directory containing window statistics
      pattern: "windows_stats"
  - versions_spectre:
      type: string
      description: Version information for Spectre
authors:
  - "@nmahfel"
maintainers:
  - "@nmahfel"
